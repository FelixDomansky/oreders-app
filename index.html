<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Накладные</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Клиент</h2>
<input id="name" placeholder="Имя / организация">

<h2>От кого</h2>
<select id="from">
  <option>Обувная Фабрика "ЭРА-ПРОФИ"</option>
  <option>ИП Курбатова Л.И</option>
</select>

<h2>Номер накладной</h2>
<input id="invoiceNumber" placeholder="Введите номер">

<h2>Добавить товар</h2>
<input id="search" placeholder="Наименование">
<input id="price" placeholder="Цена">
<input id="qty" placeholder="Количество" type="number">

<button onclick="addItem()">➕ Добавить</button>

<h2>Заказ</h2>
<div id="order"></div>

<h3 id="total">Итого: 0 ₽</h3>

<button onclick="printOrder()">🖨 Печать</button>
<button onclick="clearOrder()">🧹 Очистить</button>

<script src="app.js"></script>

</body>
</html>
