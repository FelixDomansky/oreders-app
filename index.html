<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заказ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h2>Клиент</h2>
    <input type="text" placeholder="ФИО / организация (или оставить пустым)" />

    <h2>От кого</h2>
    <select>
      <option>Обувная фабрика "ЭРА-ПРОФИ"</option>
      <option>ИП Курбатова Л.И</option>
    </select>

    <h2>Номер накладной</h2>
    <input type="text" placeholder="Введите номер накладной (или оставить пустым)" />

    <h2>Добавить товар</h2>
    <input type="text" placeholder="Начните вводить артикул или введите свой товар" />
    <div class="hint">Можно выбрать из базы или ввести вручную</div>

    <input type="number" placeholder="Цена" />
    <input type="number" placeholder="Количество" />

    <button>Добавить</button>

    <div class="order-block">
      <h2>Заказ</h2>
      <div class="total">Итого: 0 ₽</div>
    </div>

    <button>Печать</button>
    <button>Очистить</button>
  </div>
</body>
</html>
