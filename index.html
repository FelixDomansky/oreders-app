<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Накладные</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Клиент</h2>
<input id="name" placeholder="ФИО / организация (или оставить пустым)">

<h2>От кого</h2>
<select id="from">
  <option>Обувная Фабрика "ЭРА-ПРОФИ"</option>
  <option>ИП Курбатова Л.И</option>
</select>

<h2>Номер накладной</h2>
<input id="invoiceNumber" placeholder="Введите номер накладной (или оставить пустым)">

<h2>Добавить товар</h2>

<input id="search" placeholder="Начните вводить артикул или введите свой товар">
<small>Можно выбрать из базы или ввести вручную</small>

<div id="suggestions"></div>

<input id="price" placeholder="Цена">
<input id="qty" type="number" placeholder="Количество">

<button onclick="addItem()">Добавить</button>

<h2>Заказ</h2>
<div id="order"></div>

<h3 id="total">Итого: 0 ₽</h3>

<button onclick="printOrder()">Печать</button>
<button onclick="downloadPDF()">Скачать PDF</button>
<button onclick="clearOrder()">Очистить</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="app.js" defer></script>

</body>
</html>
